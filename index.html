<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>南阳市电子围栏查询</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Microsoft YaHei",
                sans-serif;
            background: #f5f7fa;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ddd;
            z-index: 10;
        }

        .title {
            margin: 0 0 12px 0;
            font-size: 20px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        #addressInput {
            flex: 1;
            height: 42px;
            padding: 0 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        #searchButton {
            width: 100px;
            border: none;
            border-radius: 6px;
            background: #1677ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #searchButton:hover {
            background: #4096ff;
        }

        #searchButton:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .main {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        #map {
            flex: 1;
        }

        .panel {
            width: 340px;
            padding: 20px;
            background: white;
            border-left: 1px solid #ddd;
            overflow-y: auto;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 18px;
        }

        .status {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 6px;
            color: #666;
        }

        .result {
            margin-top: 20px;
        }

        .result-item {
            margin-bottom: 14px;
        }

        .label {
            font-size: 13px;
            color: #999;
        }

        .value {
            margin-top: 4px;
            font-size: 16px;
            color: #222;
            word-break: break-all;
        }

        .success {
            color: #16a34a;
        }

        .error {
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }

            #map {
                min-height: 60vh;
            }

            .panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid #ddd;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">

        <h1 class="title">
            南阳市电子围栏查询
        </h1>

        <div class="search-bar">

            <input
                id="addressInput"
                type="text"
                placeholder="请输入卧龙区或宛城区地址"
            >

            <button id="searchButton">
                查询
            </button>

        </div>

    </div>


    <div class="main">

        <div id="map"></div>

        <div class="panel">

            <h2>查询结果</h2>

            <div
                id="status"
                class="status"
            >
                正在加载电子围栏数据...
            </div>

            <div
                id="result"
                class="result"
            ></div>

        </div>

    </div>

</div>

<script src="./core/spatial.js"></script>
<script src="./ui/render.js"></script>

</body>
</html>
