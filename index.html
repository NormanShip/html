<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快递员查询工具</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="app">

    <div class="header">

        <h1 class="title">快递员查询工具</h1>

        <div class="search-tabs">
            <button class="search-tab active" data-tab="poi">地点搜索</button>
            <button class="search-tab" data-tab="address">地址解析</button>
            <button class="search-tab" data-tab="courier">快递员搜索</button>
        </div>

        <div class="search-panel active" id="searchPanelPoi">
            <div class="search-bar">
                <input id="poiInput" type="text" placeholder="输入地点名称，如：永诚商厦">
                <button id="poiSearchBtn">搜索</button>
            </div>
        </div>

        <div class="search-panel" id="searchPanelAddress">
            <div class="search-bar">
                <input id="addressInput" type="text" placeholder="输入详细地址，如：卧龙区XX路123号">
                <button id="addressSearchBtn">解析</button>
            </div>
        </div>

        <div class="search-panel" id="searchPanelCourier">
            <div class="search-bar">
                <input id="courierInput" type="text" placeholder="输入快递员姓名（支持模糊搜索）">
                <button id="courierSearchButton">搜索</button>
            </div>
        </div>

    </div>

    <div class="main">

        <div id="map"></div>

        <div class="panel">

            <div id="status" class="status">正在加载...</div>

            <div id="poiCandidates" class="poi-candidates" style="display:none">
                <h2>候选位置</h2>
                <div id="poiList"></div>
            </div>

            <div id="result" class="result"></div>

            <div id="nearby" class="nearby" style="display:none">
                <div id="nearbyList"></div>
            </div>

        </div>

    </div>

</div>

<!-- AMap JS API -->
<script>
    window._AMapSecurityConfig = {
        securityJsCode: "d29574a5ca54c6d994acdff66d4153a1"
    };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=385c6054d297c3f73d3efdabd0381dc4&plugin=AMap.Geocoder,AMap.PlaceSearch"></script>

<script src="./js/fence.js"></script>
<script src="./js/amap.js"></script>
<script src="./js/ui.js"></script>
<script src="./dispatch/courier-search.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
